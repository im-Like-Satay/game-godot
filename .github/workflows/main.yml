name: "Auto Build Web"
on: push

jobs:
  export_web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Godot Web Export
        uses: firebelley/godot-export@v5.2.1
        with:
          # Link ini harus lengkap dan benar
          godot_executable_download_url: https://github.com
          godot_export_templates_download_url: https://github.com
          relative_project_path: ./
          # Parameter yang benar sesuai log error Anda:
          archive_output: true
          # Gunakan path export yang sudah Anda set di export_presets.cfg laptop Anda
          use_preset_export_path: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-Export-Game
          # Path default hasil build firebelley
          path: /home/runner/.local/share/godot/builds/
